<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="popup">
      <h2 style="color: #e74c3c">Đăng ký nhận khuyến mãi!</h2>
      <p>
        Nhập email của bạn để không bỏ lỡ những deal "Siêu Sale Công Nghệ" mới
        nhất từ chúng tôi.
      </p>
      <div style="margin-top: 20px">
        <input
          type="email"
          placeholder="Nhập địa chỉ email..."
          style="padding: 10px; width: 60%"
        />
        <button
          style="
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
          "
        >
          Đăng ký ngay
        </button>
      </div>
    </div>
  </body>
</html>
